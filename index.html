<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso</title>

<link rel="icon" type="img/png" href="img/p.png">

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("img/Login.png") no-repeat center center fixed;
    background-size: cover; 
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'IM Fell English SC', serif;
    overflow: hidden;
    background-color: black;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #a11228;
    border-radius: 50%;
    box-shadow: 0 0 8px #a11228;
    animation: blink 2s infinite alternate;
    pointer-events: none;
}

@keyframes blink {
    from { opacity: 0.2; }
    to { opacity: 0.8; }
}

.login-box {
    width: 320px;
    padding: 40px;
    border: 2px solid #7a1e2d;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
    background-color: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(5px);
    text-align: center;
    color: #ffb3c6;
    z-index: 10;
}

input {
    width: 80%;
    padding: 10px;
    margin-top: 20px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #a11228;
    color: #ffb3c6;
    text-align: center;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #a11228;
    color: #a11228;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    transition: 0.3s;
}

button:hover {
    background: #a11228;
    color: black;
    box-shadow: 0 0 15px #a11228;
}

#mensagem {
    margin-top: 15px;
    color: #ff0040;
    font-weight: bold;
    min-height: 20px;
}

.shake { 
    animation: shake 0.5s; 
    border-color: #ff0000 !important; 
    box-shadow: 0 0 40px #ff0000 !important;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
}

</style>
</head>

<body>

<div class="login-box">
    <h2 style="font-family: 'Pirata One', cursive; font-size: 2.5rem; margin-bottom: 0;">Nosso Portal</h2>
    <p>Somente nós dois.</p>

    <input type="password" id="senha" placeholder="Senha">
    <br>
    <button onclick="entrar()">Entrar</button>

    <p id="mensagem"></p>
</div>

<script>
/* estrelas */
for(let i=0;i<60;i++){ 
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(star);
}

const inputSenha = document.getElementById("senha");

inputSenha.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        entrar();
    }
});

function entrar() {
    let senha = document.getElementById("senha").value.toLowerCase().trim();
    const msg = document.getElementById("mensagem");
    const box = document.querySelector('.login-box');

    box.classList.remove('shake');

    if (senha === "goth") {
        // Redireciona para a página principal
        window.location.href = "portal.html";
    } 
    else if (senha === "hellokitty" || senha === "hello") { 
        window.location.href = "https://void2p.github.io/Portal/";
    }
    else if (senha === "primeiro") {
        window.location.href = "Burton.html";
    } 
    else if (senha === "amo você") { // Ajustado para evitar conflito com a senha 'goth'
        window.location.href = "Amo você.html";
    } 
    else if (senha === "nenem") {
        msg.innerText = "Eu te amo MUUUIITOO.";
    } 
    else if (senha === "papai") {
        msg.innerText = "QUE LINDAAA VOSE ACERTOU";
    } 
    else if (senha === "segredo") {
        msg.innerText = "Nossa, viu nos códigos ou eu não aguentei e te falei?";
    }
    else if (senha === "codeina") {
        msg.innerText = "A dona do meu coração e do meu ser.";
    }
    else if (senha === "escatologia filmes") {
        window.location.href = "https://escatologiafilmes.com";
    }
    else if (senha === "larga a mão") {
        msg.innerText = "Larga a mão que você escreveu larga a mão kkkkkk";
    }
    else if (senha === "infinito") {
        msg.innerText = "Nosso tempo não tem ponteiros, apenas o sempre.";
    }
    else if (senha === "kaneki" || senha === "paulo") {
        msg.innerText = "Por favor né, eu i ele";
    }
    else if (senha === "tubarão te amo") {
        msg.innerText = "TCHUBARAAAWWWWW";
    }
    else {
        // Erro
        void box.offsetWidth; 
        box.classList.add('shake');
        msg.innerText = "Senha errada.";
    }
}
    
</script>

</body>
</html>
